---
deployment:
  tasks:
    # Paths
    - export DEPLOYPATH=/home/earthsci/public_html
    - export REPOPATH=/home/earthsci/public_html/repositories/ESO2

    # Remove old backup if exists
    - /bin/rm -Rf "${DEPLOYPATH}_old"

    # Backup current site
    - /bin/rsync -a ${DEPLOYPATH}/ ${DEPLOYPATH}_old/

    # Deploy new version (exclude .git and SSL .well-known)
    - /bin/rsync -a --delete-after --exclude='.git' --exclude='.well-known' ${REPOPATH}/ ${DEPLOYPATH}/

    # Enter app directory
    - cd ${DEPLOYPATH}

    # Install Python dependencies in virtualenv
    - /home/earthsci/virtualenv/public_html/3.11/bin/pip install -r requirements.txt

    # Run Django migrations
    - /home/earthsci/virtualenv/public_html/3.11/bin/python manage.py migrate

    # Collect static files for WhiteNoise
    - /home/earthsci/virtualenv/public_html/3.11/bin/python manage.py collectstatic --noinput

    # Fix permissions
    - /bin/find ${DEPLOYPATH} -type d -exec /bin/chmod 755 {} \;
    - /bin/find ${DEPLOYPATH} -type f -exec /bin/chmod 644 {} \;