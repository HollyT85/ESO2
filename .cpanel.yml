---
deployment:
  tasks:
    # Paths
    - export DEPLOYPATH=/home/earthsci/public_html
    - export REPOPATH=/home/earthsci/public_html/repositories/ESO2
    - export NEWPATH=/home/earthsci/public_html_new

    # Clean previous temp deploy
    - /bin/rm -Rf "${NEWPATH}"

    # Copy repo to new location (no delete needed here)
    - /bin/rsync -a --exclude='.git' --exclude='.well-known' ${REPOPATH}/ ${NEWPATH}/

    # Install Python dependencies
    - /home/earthsci/virtualenv/public_html/3.11/bin/pip install -r ${NEWPATH}/requirements.txt

    # Run Django migrations
    - /home/earthsci/virtualenv/public_html/3.11/bin/python ${NEWPATH}/manage.py migrate

    # Collect static files
    - /home/earthsci/virtualenv/public_html/3.11/bin/python ${NEWPATH}/manage.py collectstatic --noinput

    # Backup current site
    - /bin/rm -Rf "${DEPLOYPATH}_old"
    - /bin/mv ${DEPLOYPATH} ${DEPLOYPATH}_old

    # Switch new version live
    - /bin/mv ${NEWPATH} ${DEPLOYPATH}

    # Fix permissions
    - /bin/find ${DEPLOYPATH} -type d -exec /bin/chmod 755 {} \;
    - /bin/find ${DEPLOYPATH} -type f -exec /bin/chmod 644 {} \;
