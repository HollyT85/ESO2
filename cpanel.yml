YAML

deployment:
  tasks:
    - export DEPLOYPATH=/home/earthsci/repositories/ESO2
    - /bin/rsync -av --exclude='.git' ./ $DEPLOYPATH
    - cd $DEPLOYPATH
    - source /home/earthsci/virtualenv/public_html/repositories/ESO2/3.11/bin/activate && pip install -r requirements.txt
    - python manage.py migrate
    - python manage.py collectstatic --noinput