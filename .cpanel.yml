---
deployment:
  tasks:
    # Paths
    - export DEPLOYPATH=/home/earthsci/public_html
    - export REPOPATH=/home/earthsci/public_html/repositories/ESO2

    # Ensure deploy path exists
    - /bin/mkdir -p ${DEPLOYPATH}

    # Copy files (no delete, no risk)
    - /bin/rsync -a --delete-after --exclude='.git' --exclude='.well-known' --exclude='repositories' ${REPOPATH}/ ${DEPLOYPATH}/

    # Enter app directory
    - cd ${DEPLOYPATH}

    # Install Python dependencies
    - /home/earthsci/virtualenv/public_html/repositories/ESO2/3.11/bin/pip install -r requirements.txt

    # Run Django migrations
    - /home/earthsci/virtualenv/public_html/repositories/ESO2/3.11/bin/python manage.py migrate

    # Collect static files
    - /home/earthsci/virtualenv/public_html/repositories/ESO2/3.11/bin/python manage.py collectstatic --noinput

    # Fix permissions
    - /bin/find ${DEPLOYPATH} -type d -exec /bin/chmod 755 {} \;
    - /bin/find ${DEPLOYPATH} -type f -exec /bin/chmod 644 {} \;
