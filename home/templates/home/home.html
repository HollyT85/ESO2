{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container">
    <h2>Welcome to Earth Science Outreach UK</h2>
    <div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="{% static 'media/images/carousel/IMG_2649.jpeg' %}" class="d-block w-100" alt="Staithes">
    </div>
    <div class="carousel-item">
      <img src="{% static 'media/images/carousel/IMG_2630.jpeg'%}" class="d-block w-100" alt="cliff">
    </div>
    <div class="carousel-item">
      <img src="{% static 'media/images/carousel/fossils.jpeg'%}" class="d-block w-100" alt="fossils">
    </div>
    <div class="carousel-item">
      <img src="{% static 'media/images/carousel/polishing.jpeg'%}" class="d-block w-100" alt="fossil polishing">
    </div>
    <div class="carousel-item">
      <img src="{% static 'media/images/carousel/Dacentrurus.jpeg'%}" class="d-block w-100" alt="Dacentrurus model">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
</div>
{% endblock %}
